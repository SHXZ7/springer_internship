# Schema for Black Diamond Contact Phones (Silver Layer)
version: "1.0"

columns:
  - name: contact_id
    type: String
    nullable: false
    description: "Unique identifier for the contact (UUID format)"

  - name: phone_type
    type: String
    nullable: true
    description: "Type/category of phone number (e.g., HOME, MOBILE, Phone, Work Phone)"

  - name: phone_number
    type: String
    nullable: true
    description: "Phone number (cleaned and normalized, digits only)"

  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier in Glynac system"

  - name: processing_date
    type: Date
    nullable: false
    description: "Date when the record was processed"