columns:
  - name: contact_id
    type: String
    nullable: false
    description: "Unique identifier for the contact"

  - name: employer_name
    type: String
    nullable: true
    description: "Name of the employer"

  - name: title
    type: String
    nullable: true
    description: "Job title at the employer"

  - name: occupation
    type: String
    nullable: true
    description: "Occupation category (normalized to lowercase)"

  - name: start_date
    type: String
    nullable: true
    description: "Employment start date"

  - name: end_date
    type: String
    nullable: true
    description: "Employment end date"

  - name: is_current
    type: Bool
    nullable: true
    description: "Flag indicating if this is current employment"

  - name: glynac_organization_id
    type: LowCardinality(String)
    nullable: false
    description: "Organization identifier in Glynac system"

  - name: processing_date
    type: Date
    nullable: false
    description: "Date when the record was processed"