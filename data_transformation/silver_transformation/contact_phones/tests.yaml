tests:

  - name: row_count_check
    description: Ensure table is not empty
    query: |
      SELECT COUNT(*) FROM blackdiamond_silver.contact_phones
    condition: "> 0"

  - name: contact_id_not_null
    description: contact_id must not be null
    query: |
      SELECT COUNT(*)
      FROM blackdiamond_silver.contact_phones
      WHERE contact_id IS NULL
    condition: "= 0"

  - name: phone_number_not_null
    description: phone numbers must not be null
    query: |
      SELECT COUNT(*)
      FROM blackdiamond_silver.contact_phones
      WHERE number IS NULL
    condition: "= 0"

  - name: phone_number_length
    description: phone numbers must have at least 7 digits
    query: |
      SELECT COUNT(*)
      FROM blackdiamond_silver.contact_phones
      WHERE length(number) < 7
    condition: "= 0"

  - name: remove_pii_masking_rows
    description: ensure masked rows are removed
    query: |
      SELECT COUNT(*)
      FROM blackdiamond_silver.contact_phones
      WHERE glynac_organization_id = 'org_pii_masking'
    condition: "= 0"

  - name: duplicate_phone_check
    description: ensure no duplicate phones per contact
    query: |
      SELECT contact_id, number, COUNT(*)
      FROM blackdiamond_silver.contact_phones
      GROUP BY contact_id, number
      HAVING COUNT(*) > 1
    condition: "= 0"