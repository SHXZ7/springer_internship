dag:
  dag_id: silver_contact_phones
  schedule_interval: "@daily"
  start_date: 2026-03-06
  catchup: false

retries: 2
retry_delay_minutes: 5

owner: data_engineering
description: "Bronze to Silver transformation for contact phones dataset"

tags:
  - silver
  - contact_phones
  - transformation

source:
  database: blackdiamond
  table: contact_phones_raw

target:
  database: blackdiamond_silver
  table: contact_phones

transformation:
  query_file: query.sql

processing:
  deduplicate: true
  remove_pii_masking: true
  normalize_phone_numbers: true