dag:
  dag_id: silver_contact_employments
  schedule_interval: "@daily"
  start_date: 2026-03-06
  catchup: false

retries: 2
retry_delay_minutes: 5

owner: data_engineering
description: "Bronze to Silver transformation for contact employments dataset"

tags:
  - silver
  - contact_employments
  - transformation

source:
  database: blackdiamond
  table: contact_employments_raw

target:
  database: blackdiamond_silver
  table: contact_employments

transformation:
  query_file: query.sql

processing:
  deduplicate: true
  remove_pii_tags: true
  normalize_occupation: true