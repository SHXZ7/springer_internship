version: "1.0"

dag:
  dag_id: "silver_blackdiamond_contact_employments"
  description: "Silver transformation for Black Diamond contact employments - transforms employment history data from bronze to silver layer"
  tags: ["silver", "blackdiamond", "contact_employments", "employment_history"]
  schedule_interval: "dataset"
  default_args:
    owner: "data_engineering"
    retries: 3
    retry_delay_minutes: 5
    execution_timeout_minutes: 30

source:
  database: blackdiamond
  table: contact_employments_raw
  description: "Raw employment data from Black Diamond CRM"

target:
  database: blackdiamond_silver
  table: contact_employments
  description: "Cleaned and transformed employment records"

# Data retention and lookback configuration
lookback_days: 90

# Processing configuration
processing:
  batch_size: 10000
  parallelism: 4
  enable_caching: true