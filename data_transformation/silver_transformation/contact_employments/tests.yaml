tests:

  - name: row_count_check
    description: Ensure table is not empty
    query: |
      SELECT COUNT(*) FROM blackdiamond_silver.contact_employments
    condition: "> 0"

  - name: contact_id_not_null
    description: contact_id must not be null
    query: |
      SELECT COUNT(*)
      FROM blackdiamond_silver.contact_employments
      WHERE contact_id IS NULL
    condition: "= 0"

  - name: valid_uuid_contact_id
    description: contact_id should follow UUID format
    query: |
      SELECT COUNT(*)
      FROM blackdiamond_silver.contact_employments
      WHERE NOT match(contact_id,'^[0-9a-f-]{36}$')
    condition: "= 0"

  - name: start_date_valid
    description: start_date must be valid date
    query: |
      SELECT COUNT(*)
      FROM blackdiamond_silver.contact_employments
      WHERE start_date IS NULL
    condition: "= 0"

  - name: pii_tags_removed
    description: ensure PII tags like ⟦P:xxxx⟧ are removed
    query: |
      SELECT COUNT(*)
      FROM blackdiamond_silver.contact_employments
      WHERE match(occupation,'⟦[pP]:')
    condition: "= 0"

  - name: remove_pii_masking_rows
    description: ensure masking rows are removed
    query: |
      SELECT COUNT(*)
      FROM blackdiamond_silver.contact_employments
      WHERE glynac_organization_id = 'org_pii_masking'
    condition: "= 0"

  - name: duplicate_employment_check
    description: ensure no duplicate employment records
    query: |
      SELECT contact_id, occupation, start_date, COUNT(*)
      FROM blackdiamond_silver.contact_employments
      GROUP BY contact_id, occupation, start_date
      HAVING COUNT(*) > 1
    condition: "= 0"